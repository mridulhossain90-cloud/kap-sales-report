<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAP Sales Reporting System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container" id="loginSection">
    <h1>Khan Agricultural Products Ltd.</h1>
    <h2>Sales Reporting System</h2>

    <div class="card">
      <h3>Login</h3>

      <input type="email" id="email" placeholder="Email Address" />
      <input type="password" id="password" placeholder="Password" />

      <button id="loginBtn">Login</button>
    </div>
  </div>

  <div class="dashboard" id="dashboardSection" style="display: none;">
    <h1>KAP Dashboard</h1>
    <p>Welcome to Khan Agricultural Products Ltd. Sales Reporting System</p>

    <div class="menu">
      <button>Sales Entry</button>
      <button>Dealer Management</button>
      <button>Product Management</button>
      <button>Daily Sales Report</button>
      <button>Monthly Report</button>
    </div>
  </div>

  <script type="module" src="/script.js"></script>
</body>
</html>
