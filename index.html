<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAP Sales Reporting System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container" id="loginSection">
    <h1>Khan Agricultural Products Ltd.</h1>
    <h2>Sales Reporting System</h2>

    <div class="card">
      <h3>Login</h3>
      <input type="email" id="email" placeholder="Email Address" />
      <input type="password" id="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
    </div>
  </div>

  <div class="dashboard" id="dashboardSection" style="display: none;">
    <div class="topbar">
      <div>
        <h1>KAP Dashboard</h1>
        <p>Khan Agricultural Products Ltd. Sales Reporting System</p>
      </div>
      <button id="logoutBtn" class="logout">Logout</button>
    </div>

    <div class="menu">
      <button onclick="showSection('salesEntry')">Sales Entry</button>
      <button onclick="showSection('dealerManagement')">Dealer Management</button>
      <button onclick="showSection('productManagement')">Product Management</button>
      <button onclick="showSection('dailyReport')">Daily Report</button>
    </div>

    <div class="section" id="salesEntry">
      <h2>Sales Entry</h2>

      <input type="date" id="saleDate" />
      <input type="text" id="dealerName" placeholder="Dealer Name" />
      <input type="text" id="productName" placeholder="Product Name" />
      <input type="number" id="quantity" placeholder="Quantity" />
      <input type="number" id="price" placeholder="Unit Price" />

      <button id="saveSaleBtn">Save Sale</button>
    </div>

    <div class="section" id="dealerManagement" style="display:none;">
      <h2>Dealer Management</h2>

      <input type="text" id="newDealerName" placeholder="Dealer Name" />
      <input type="text" id="dealerPhone" placeholder="Phone Number" />
      <input type="text" id="dealerArea" placeholder="Area" />

      <button id="saveDealerBtn">Save Dealer</button>
    </div>

    <div class="section" id="productManagement" style="display:none;">
      <h2>Product Management</h2>

      <input type="text" id="newProductName" placeholder="Product Name" />
      <input type="number" id="productPrice" placeholder="Product Price" />

      <button id="saveProductBtn">Save Product</button>
    </div>

    <div class="section" id="dailyReport" style="display:none;">
      <h2>Daily Sales Report</h2>

      <button id="loadReportBtn">Load Report</button>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Dealer</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="reportTable"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="/script.js"></script>
</body>
</html>
